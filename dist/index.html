<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Canales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
    --surface: #ffffff;
    --surface-soft: #f5f5f5;
    --active: #ebebeb;
    --line: #d7d7d7;
    --text: #101010;
    --muted: #4d4d4d;
    --list-side-gap: clamp(120px, 15vw, 220px);
}

* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    font-family: "Space Grotesk", sans-serif;
    color: var(--text);
    background: var(--surface);
}

body {
    overflow: hidden;
}

.app {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: #000;
    overflow: hidden;
}

.sidebar {
    order: 2;
    width: 100%;
    flex: 1 1 auto;
    border-top: 1px solid rgba(255, 255, 255, 0.22);
    background:
        linear-gradient(90deg,
            rgba(0, 0, 0, 0.92) 0%,
            rgba(7, 10, 16, 0.82) 14%,
            rgba(7, 10, 16, 0.82) 86%,
            rgba(0, 0, 0, 0.92) 100%);
    backdrop-filter: blur(8px);
    padding: 14px 0;
    display: flex;
    flex-direction: column;
    min-height: 0;
}

.channel-list {
    width: calc(100% - (var(--list-side-gap) * 2));
    max-width: 980px;
    margin: 0 auto;
    padding: 0;
    list-style: none;
    display: flex;
    flex-direction: column;
    flex: 1 1 auto;
    min-height: 0;
    gap: 0;
    overflow-y: auto;
    overflow-x: hidden;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.24);
}

.channel-list li {
    margin: 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.16);
}

.channel-button {
    width: 100%;
    border: 0;
    border-left: 4px solid transparent;
    border-radius: 0;
    padding: 14px 16px;
    background: transparent;
    color: #ffffff;
    text-align: left;
    cursor: pointer;
    transition: background 140ms ease, border-color 140ms ease;
}

.channel-button:hover {
    background: rgba(255, 255, 255, 0.12);
    border-left-color: rgba(255, 255, 255, 0.85);
}

.channel-button.active {
    border-left-color: #ffffff;
    background: rgba(255, 255, 255, 0.22);
}

.channel-title {
    display: block;
    font-size: 1.02rem;
    font-weight: 700;
}

.channel-row {
    display: flex;
    align-items: center;
    gap: 12px;
}

.channel-logo {
    width: 72px;
    height: 24px;
    object-fit: contain;
    flex-shrink: 0;
}

.channel-text {
    min-width: 0;
}

.channel-subtitle {
    display: block;
    margin-top: 4px;
    color: rgba(255, 255, 255, 0.72);
    font-size: 0.85rem;
}

.preview {
    order: 1;
    width: calc(100% - (var(--list-side-gap) * 2));
    max-width: 980px;
    margin: 0 auto;
    flex: 0 0 62vh;
    min-height: 280px;
    background: var(--surface);
    padding: 0;
    display: flex;
    flex-direction: column;
}

.frame-wrap {
    position: relative;
    flex: 1;
    min-height: 0;
    margin: 0;
    border: 0;
    border-radius: 0;
    overflow: hidden;
    background: #000;
}

.frame-wrap::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 42%;
    z-index: 3;
    opacity: 0;
    pointer-events: none;
    transition: opacity 260ms ease;
    background: linear-gradient(to bottom, rgba(2, 5, 11, 0.95) 0%, rgba(2, 5, 11, 0.58) 45%, rgba(2, 5, 11, 0) 100%);
}

.frame-wrap:hover::before,
.frame-wrap:focus-within::before,
.frame-wrap.overlay-visible::before {
    opacity: 1;
}

.frame-wrap.user-inactive:not(:hover):not(:focus-within)::before {
    opacity: 0 !important;
}

.epg-overlay {
    position: absolute;
    left: 12px;
    right: 12px;
    top: 12px;
    z-index: 4;
    display: flex;
    align-items: flex-start;
    gap: 18px;
    padding: 6px 0;
    border-radius: 0;
    border: none;
    background: transparent;
    backdrop-filter: none;
    pointer-events: none;
    opacity: 0;
    transform: translateY(-8px);
    transition: opacity 260ms ease, transform 260ms ease;
}

.frame-wrap:hover .epg-overlay,
.frame-wrap:focus-within .epg-overlay,
.frame-wrap.overlay-visible .epg-overlay {
    opacity: 1;
    transform: translateY(0);
}

.frame-wrap.user-inactive:not(:hover):not(:focus-within) .epg-overlay {
    opacity: 0 !important;
    transform: translateY(-8px) !important;
}

.epg-logo-box {
    width: 90px;
    height: 90px;
    border-radius: 0;
    overflow: visible;
    display: grid;
    place-items: center;
    border: none;
    background: transparent;
    flex-shrink: 0;
}

.epg-logo {
    width: 90px;
    height: 90px;
    object-fit: contain;
    background: transparent;
}

.epg-logo-fallback {
    font-family: "Oswald", sans-serif;
    font-size: 1.85rem;
    letter-spacing: 0.04em;
    color: #fff;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.65);
}

.epg-meta {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
}


.epg-channel {
    margin: 0;
    color: #fff;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.7);
}

.epg-now {
    margin: 0;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.7);
}

.epg-next-meta {
    margin-left: auto;
    min-width: 32%;
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 3px;
}

.epg-next-label {
    margin: 0;
    color: rgba(255, 255, 255, 0.92);
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.7);
}

.epg-next {
    margin: 0;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.7);
}

#previewFrame {
    width: 100%;
    height: 100%;
    border: 0;
    background: #000;
}

@media (max-width: 920px) {
    :root {
        --list-side-gap: 12px;
    }

    .preview {
        flex-basis: 56vh;
        min-height: 220px;
    }

    .sidebar {
        padding: 12px 0;
    }

    .channel-list {
        margin: 0 auto;
    }

    .channel-button {
        padding: 12px;
    }

    .channel-logo {
        width: 60px;
        height: 20px;
    }

    .channel-subtitle {
        display: none;
    }

    .epg-overlay {
        left: 8px;
        right: 8px;
        top: 8px;
        padding: 4px 0;
        gap: 12px;
    }

    .epg-logo-box {
        width: 68px;
        height: 68px;
    }

    .epg-logo {
        width: 68px;
        height: 68px;
    }

    .epg-channel {
        font-size: 1.35rem;
    }

    .epg-now,
    .epg-next {
        font-size: 1.1rem;
    }

    .epg-next-meta {
        display: none;
    }
}
</style>

const currentBitmovinKey = (localStorage.getItem(storageKey) || "").trim();
if (!currentBitmovinKey && defaultBitmovinKey) {
    localStorage.setItem(storageKey, defaultBitmovinKey);
}

function renumberChannelSubtitles() {
    buttons.forEach((button, index) => {
        const subtitle = button.querySelector(".channel-subtitle");
        if (!subtitle) {
            return;
        }

        const text = String(subtitle.textContent || "").trim();
        const typeMatch = text.match(/-\s*(.+)$/);
        const channelType = typeMatch && typeMatch[1]
            ? typeMatch[1].trim()
            : "ClearKey";

        subtitle.textContent = `Canal ${index + 1} - ${channelType}`;
    });
}

function getStoredBitmovinKey() {
    return (localStorage.getItem(storageKey) || "").trim();
}

function buildChannelUrl(baseSrc) {
    const key = getStoredBitmovinKey();

    if (!key) {
        return baseSrc;
    }

    const separator = baseSrc.includes("?") ? "&" : "?";
    return `${baseSrc}${separator}bitmovinKey=${encodeURIComponent(key)}`;
}

function getActiveButton() {
    return document.querySelector(".channel-button.active") || buttons[0];
}

function getChannelKey(value) {
    return String(value || "")
        .split("?")[0]
        .trim()
        .toLowerCase()
        .replace(/\.html$/i, "");
}

function normalizeComparableText(value) {
    return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
}

function parseXmltvDate(value) {
    const source = String(value || "").trim();
    if (!source) {
        return null;
    }

    const match = source.match(/^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})(?:\s*([+\-]\d{4}))?/);
    if (!match) {
        return null;
    }

    const year = Number(match[1]);
    const month = Number(match[2]) - 1;
    const day = Number(match[3]);
    const hour = Number(match[4]);
    const minute = Number(match[5]);
    const second = Number(match[6]);
    const offset = match[7];

    const utcMs = Date.UTC(year, month, day, hour, minute, second);
    if (!offset) {
        return new Date(utcMs);
    }

    const sign = offset[0] === "-" ? -1 : 1;
    const offsetHours = Number(offset.slice(1, 3));
    const offsetMinutes = Number(offset.slice(3, 5));
    const offsetTotalMs = sign * ((offsetHours * 60) + offsetMinutes) * 60000;

    return new Date(utcMs - offsetTotalMs);
}

function formatEpgTime(date) {
    if (!(date instanceof Date) || Number.isNaN(date.getTime())) {
        return "--:--";
    }

    return date.toLocaleTimeString("es-MX", {
        hour: "2-digit",
        minute: "2-digit"
    });
}

async function decodeXmltvTextFromBuffer(buffer) {
    const bytes = new Uint8Array(buffer);
    const isGzip = bytes.length > 2 && bytes[0] === 0x1f && bytes[1] === 0x8b;

    if (!isGzip) {
        return new TextDecoder("utf-8").decode(buffer);
    }

    if (typeof DecompressionStream === "undefined") {
        throw new Error("Este navegador no soporta archivos .gz con DecompressionStream");
    }

    const decompressedStream = new Blob([buffer]).stream().pipeThrough(new DecompressionStream("gzip"));
    return new Response(decompressedStream).text();
}

async function fetchXmltvText(url) {
    const response = await fetch(url, {cache: "no-store"});
    if (!response.ok) {
        let extra = "";
        const contentType = response.headers.get("content-type") || "";

        if (contentType.includes("application/json") || contentType.includes("text/")) {
            const body = await response.text();
            extra = body ? ` - ${body.slice(0, 220)}` : "";
        }

        throw new Error(`HTTP ${response.status}${extra}`);
    }

    const buffer = await response.arrayBuffer();
    return decodeXmltvTextFromBuffer(buffer);
}

async function fetchXmltvTextWithFallback(urls) {
    const failures = [];

    for (let index = 0; index < urls.length; index += 1) {
        const url = urls[index];

        try {
            return await fetchXmltvText(url);
        } catch (error) {
            const message = error && error.message ? error.message : String(error);
            failures.push(`${url} -> ${message}`);
            console.warn("Fallo EPG en", url, error);
        }
    }

    throw new Error(`No se pudo descargar el XMLTV. ${failures.join(" | ")}`);
}

function explainEpgError(error, channelDisplayName = "solicitado") {
    const rawMessage = String(error && error.message ? error.message : error || "Error desconocido");
    const message = rawMessage.toLowerCase();

    if (message.includes("failed to fetch") || message.includes("cors")) {
        return `Bloqueo CORS/red: ${rawMessage}`;
    }

    if (message.includes("decompressionstream") || message.includes(".gz")) {
        return `Fallo al descomprimir .gz: ${rawMessage}`;
    }

    if (message.includes("xml") || message.includes("parser")) {
        return `Fallo al leer XMLTV: ${rawMessage}`;
    }

    if (message.includes("cinemax") || message.includes("bandamax") || message.includes("warner") || message.includes("hbo") || message.includes("canal")) {
        return `Canal ${channelDisplayName} no encontrado: ${rawMessage}`;
    }

    return `EPG error: ${rawMessage}`;
}

function getProgrammeTitle(programmeNode) {
    const titleNodes = programmeNode.getElementsByTagName("title");
    if (!titleNodes.length) {
        return "Sin titulo";
    }

    return (titleNodes[0].textContent || "Sin titulo").trim();
}

function extractChannelNowFromXml(xmlText, options) {
    const channelHint = options && options.channelHint ? String(options.channelHint) : "";
    const channelKeyword = options && options.channelKeyword ? String(options.channelKeyword) : "";
    const fallbackChannelName = options && options.fallbackChannelName ? String(options.fallbackChannelName) : "CANAL";

    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(xmlText, "application/xml");
    const parserError = xmlDoc.querySelector("parsererror");
    if (parserError) {
        throw new Error("No se pudo interpretar el XML de EPG");
    }

    const channelNodes = Array.from(xmlDoc.getElementsByTagName("channel"));
    const hintNormalized = normalizeComparableText(channelHint);
    const keywordNormalized = normalizeComparableText(channelKeyword);

    let selectedChannel = channelNodes.find((channelNode) => {
        const channelId = normalizeComparableText(channelNode.getAttribute("id"));
        return Boolean(hintNormalized) && channelId === hintNormalized;
    });

    if (!selectedChannel) {
        selectedChannel = channelNodes.find((channelNode) => {
            const channelId = normalizeComparableText(channelNode.getAttribute("id"));
            if (keywordNormalized && channelId.includes(keywordNormalized)) {
                return true;
            }

            const displayNames = Array.from(channelNode.getElementsByTagName("display-name"))
                .map((nameNode) => normalizeComparableText(nameNode.textContent));

            return displayNames.some((displayName) => {
                if (hintNormalized && displayName === hintNormalized) {
                    return true;
                }

                return Boolean(keywordNormalized) && displayName.includes(keywordNormalized);
            });
        });
    }

    if (!selectedChannel) {
        throw new Error(`No se encontro ${fallbackChannelName} en la lista EPG`);
    }

    const channelId = (selectedChannel.getAttribute("id") || "").trim();
    if (!channelId) {
        throw new Error(`El canal ${fallbackChannelName} no tiene id en el EPG`);
    }

    const displayNameNode = selectedChannel.getElementsByTagName("display-name")[0];
    const channelDisplayName = ((displayNameNode && displayNameNode.textContent) || channelId || fallbackChannelName).trim();

    const iconNode = selectedChannel.getElementsByTagName("icon")[0];
    const logo = iconNode ? String(iconNode.getAttribute("src") || "").trim() : "";

    const nowMs = Date.now();
    const programmeNodes = xmlDoc.getElementsByTagName("programme");
    let currentProgram = null;
    let nextProgram = null;

    for (let index = 0; index < programmeNodes.length; index += 1) {
        const programmeNode = programmeNodes[index];
        if ((programmeNode.getAttribute("channel") || "") !== channelId) {
            continue;
        }

        const start = parseXmltvDate(programmeNode.getAttribute("start"));
        if (!start) {
            continue;
        }

        const stop = parseXmltvDate(programmeNode.getAttribute("stop"));
        const startMs = start.getTime();
        const stopMs = stop ? stop.getTime() : (startMs + (30 * 60 * 1000));

        if (nowMs >= startMs && nowMs < stopMs) {
            currentProgram = { programmeNode, start, stop: stop || new Date(stopMs) };
            continue;
        }

        if (startMs > nowMs) {
            if (!nextProgram || startMs < nextProgram.start.getTime()) {
                nextProgram = { programmeNode, start, stop: stop || null };
            }
        }
    }

    if (currentProgram) {
        const title = getProgrammeTitle(currentProgram.programmeNode);
        const nextText = nextProgram
            ? `Siguiente: ${getProgrammeTitle(nextProgram.programmeNode)} (${formatEpgTime(nextProgram.start)})`
            : "Siguiente: sin informacion";

        return {
            logo,
            channelName: channelDisplayName,
            now: `Ahora: ${title} (${formatEpgTime(currentProgram.start)} - ${formatEpgTime(currentProgram.stop)})`,
            next: nextText
        };
    }

    if (nextProgram) {
        const title = getProgrammeTitle(nextProgram.programmeNode);
        return {
            logo,
            channelName: channelDisplayName,
            now: "Ahora: sin programa en este momento",
            next: `Siguiente: ${title} (${formatEpgTime(nextProgram.start)})`
        };
    }

    return {
        logo,
        channelName: channelDisplayName,
        now: "Ahora: sin programa disponible",
        next: "Siguiente: sin informacion"
    };
}

function getInitials(label) {
    const words = String(label || "")
        .trim()
        .split(/\s+/)
        .filter(Boolean);

    if (!words.length) {
        return "TV";
    }

    if (words.length === 1) {
        return words[0].slice(0, 2).toUpperCase();
    }

    return `${words[0][0]}${words[1][0]}`.toUpperCase();
}

function showLogoFallback(channelLabel) {
    if (!epgLogo || !epgLogoFallback) {
        return;
    }

    epgLogo.hidden = true;
    epgLogo.removeAttribute("src");
    epgLogoFallback.hidden = false;
    epgLogoFallback.textContent = getInitials(channelLabel);
}

function updateEpgOverlay(channelKey, fallbackName) {
    const epgData = channelEPG[channelKey] || {};
    const resolvedChannelName = epgData.channelName || fallbackName || channelKey.toUpperCase();
    const currentProgram = epgData.now || "EPG pendiente (envia tu lista)";
    const nextProgram = epgData.next || "Siguiente: pendiente";
    const logo = String(epgData.logo || "").trim();

    epgChannelName.textContent = resolvedChannelName;
    epgNowTitle.textContent = currentProgram;
    if (epgNextTitle) {
        epgNextTitle.textContent = nextProgram;
    }

    if (!logo) {
        showLogoFallback(resolvedChannelName);
        return;
    }

    epgLogo.hidden = false;
    epgLogo.alt = `Logo ${resolvedChannelName}`;
    epgLogo.src = logo;
    epgLogoFallback.hidden = true;
}

function refreshEpgOverlayIfActive(channelKey) {
    const activeButton = getActiveButton();
    if (!activeButton) {
        return;
    }

    const activeChannelKey = getChannelKey(activeButton.dataset.src);
    if (activeChannelKey !== channelKey) {
        return;
    }

    updateEpgOverlay(activeChannelKey, activeButton.dataset.name);
}

async function loadMx1EpgFromXmltv() {
    if (isMx1EpgLoading) {
        return;
    }

    isMx1EpgLoading = true;
    channelEPG.cinemax.now = "Cargando EPG desde epgshare...";
    channelEPG.cinemax.next = "Siguiente: cargando...";
    channelEPG.bandamax.now = "Cargando EPG desde epgshare...";
    channelEPG.bandamax.next = "Siguiente: cargando...";
    channelEPG.warner.now = "Cargando EPG desde epgshare...";
    channelEPG.warner.next = "Siguiente: cargando...";
    refreshEpgOverlayIfActive("cinemax");
    refreshEpgOverlayIfActive("bandamax");
    refreshEpgOverlayIfActive("warner");

    try {
        const xmlText = await fetchXmltvTextWithFallback([
            cinemaxXmltvSourceUrl,
            cinemaxXmltvDirectUrl
        ]);

        try {
            const cinemaxEpgData = extractChannelNowFromXml(xmlText, {
                channelHint: cinemaxChannelHint,
                channelKeyword: "cinemax",
                fallbackChannelName: "CINEMAX"
            });

            channelEPG.cinemax = {
                ...channelEPG.cinemax,
                ...cinemaxEpgData
            };
        } catch (error) {
            channelEPG.cinemax.now = explainEpgError(error, "CINEMAX");
            channelEPG.cinemax.next = "Siguiente: no disponible";
        }

        try {
            const bandamaxEpgData = extractChannelNowFromXml(xmlText, {
                channelHint: bandamaxChannelHint,
                channelKeyword: "bandamax",
                fallbackChannelName: "BANDAMAX"
            });

            channelEPG.bandamax = {
                ...channelEPG.bandamax,
                ...bandamaxEpgData
            };
        } catch (error) {
            channelEPG.bandamax.now = explainEpgError(error, "BANDAMAX");
            channelEPG.bandamax.next = "Siguiente: no disponible";
        }

        try {
            const warnerEpgData = extractChannelNowFromXml(xmlText, {
                channelHint: warnerChannelHint,
                channelKeyword: "warner",
                fallbackChannelName: "WARNER"
            });

            channelEPG.warner = {
                ...channelEPG.warner,
                ...warnerEpgData
            };
        } catch (error) {
            channelEPG.warner.now = explainEpgError(error, "WARNER");
            channelEPG.warner.next = "Siguiente: no disponible";
        }
    } catch (error) {
        console.warn("No se pudo cargar EPG MX1:", error);
        const reason = explainEpgError(error, "MX1");
        channelEPG.cinemax.now = reason;
        channelEPG.cinemax.next = "Siguiente: no disponible";
        channelEPG.bandamax.now = reason;
        channelEPG.bandamax.next = "Siguiente: no disponible";
        channelEPG.warner.now = reason;
        channelEPG.warner.next = "Siguiente: no disponible";
    } finally {
        refreshEpgOverlayIfActive("cinemax");
        refreshEpgOverlayIfActive("bandamax");
        refreshEpgOverlayIfActive("warner");
        isMx1EpgLoading = false;
    }
}

async function loadArEpgFromXmltv() {
    if (isArEpgLoading) {
        return;
    }

    isArEpgLoading = true;
    channelEPG.hbo.now = "Cargando EPG AR...";
    channelEPG.hbo.next = "Siguiente: cargando...";
    refreshEpgOverlayIfActive("hbo");

    try {
        const xmlText = await fetchXmltvTextWithFallback([
            hbo2XmltvSourceUrl,
            hbo2XmltvDirectUrl
        ]);

        const hbo2EpgData = extractChannelNowFromXml(xmlText, {
            channelHint: hbo2ChannelHint,
            channelKeyword: "hbo2",
            fallbackChannelName: "HBO"
        });

        channelEPG.hbo = {
            ...channelEPG.hbo,
            ...hbo2EpgData
        };
    } catch (error) {
        console.warn("No se pudo cargar EPG AR HBO2:", error);
        channelEPG.hbo.now = explainEpgError(error, "HBO");
        channelEPG.hbo.next = "Siguiente: no disponible";
    } finally {
        refreshEpgOverlayIfActive("hbo");
        isArEpgLoading = false;
    }
}

function getPrimaryEpgLoaderByChannel(channelKey) {
    if (channelKey === "hbo") {
        return loadArEpgFromXmltv;
    }

    return loadMx1EpgFromXmltv;
}

function startEpgAfterFirstChannelLoad() {
    if (epgBootstrapped) {
        return;
    }

    epgBootstrapped = true;

    const activeButton = getActiveButton();
    const activeChannelKey = activeButton ? getChannelKey(activeButton.dataset.src) : "cinemax";
    const primaryLoader = getPrimaryEpgLoaderByChannel(activeChannelKey);
    const secondaryLoader = primaryLoader === loadMx1EpgFromXmltv ? loadArEpgFromXmltv : loadMx1EpgFromXmltv;

    // Prioriza el arranque del canal; despues inicia EPG en segundo plano.
    setTimeout(async () => {
        try {
            await primaryLoader();
            await secondaryLoader();
        } catch (error) {
            console.warn("Error inicializando EPG diferido:", error);
        }

        if (!mx1EpgIntervalId) {
            mx1EpgIntervalId = setInterval(loadMx1EpgFromXmltv, epgRefreshIntervalMs);
        }

        if (!arEpgIntervalId) {
            arEpgIntervalId = setInterval(loadArEpgFromXmltv, epgRefreshIntervalMs);
        }
    }, 1200);
}

window.setDashboardEpg = (epgMap) => {
    if (!epgMap || typeof epgMap !== "object") {
        return;
    }

    Object.keys(epgMap).forEach((key) => {
        const normalizedKey = getChannelKey(key);
        channelEPG[normalizedKey] = {
            ...(channelEPG[normalizedKey] || {}),
            ...(epgMap[key] || {})
        };
    });

    const activeButton = getActiveButton();
    if (!activeButton) {
        return;
    }

    updateEpgOverlay(getChannelKey(activeButton.dataset.src), activeButton.dataset.name);
};

if (epgLogo) {
    epgLogo.addEventListener("error", () => {
        showLogoFallback(epgChannelName.textContent || "TV");
    });
}

function showFrameOverlay(durationMs = overlayVisibleMs) {
    if (!frameWrap) {
        return;
    }

    frameWrap.classList.add("overlay-visible");

    if (overlayTimeoutId) {
        clearTimeout(overlayTimeoutId);
    }

    overlayTimeoutId = setTimeout(() => {
        frameWrap.classList.remove("overlay-visible");
    }, durationMs);
}

function scheduleUserInactivityHide(durationMs = userInactivityMs) {
    if (userInactivityTimeoutId) {
        clearTimeout(userInactivityTimeoutId);
    }

    userInactivityTimeoutId = setTimeout(() => {
        if (!frameWrap) {
            return;
        }

        frameWrap.classList.add("user-inactive");
        frameWrap.classList.remove("overlay-visible");
    }, durationMs);
}

function markUserActivity() {
    if (!frameWrap) {
        return;
    }

    frameWrap.classList.remove("user-inactive");
    showFrameOverlay(overlayVisibleMs);
    scheduleUserInactivityHide(userInactivityMs);
}

function selectChannel(button) {
    const srcBase = button.dataset.src;
    const channelKey = getChannelKey(srcBase);
    const src = buildChannelUrl(srcBase);
    const name = button.dataset.name;

    buttons.forEach((item) => item.classList.remove("active"));
    button.classList.add("active");

    previewFrame.src = src;
    updateEpgOverlay(channelKey, name);
    markUserActivity();
}

function requestAudioInFrame() {
    if (!previewFrame.contentWindow) {
        return;
    }

    previewFrame.contentWindow.postMessage({type: "ENABLE_AUDIO"}, "*");
}

previewFrame.addEventListener("load", () => {
    markUserActivity();
    requestAudioInFrame();
    setTimeout(requestAudioInFrame, 250);
    setTimeout(requestAudioInFrame, 900);
    startEpgAfterFirstChannelLoad();
});

frameWrap.addEventListener("mouseenter", markUserActivity);
frameWrap.addEventListener("mousemove", markUserActivity, {passive: true});
frameWrap.addEventListener("mousedown", markUserActivity);
previewFrame.addEventListener("mouseenter", markUserActivity);
previewFrame.addEventListener("mousemove", markUserActivity, {passive: true});
previewFrame.addEventListener("mousedown", markUserActivity);
document.addEventListener("mousemove", markUserActivity, {passive: true});
document.addEventListener("mousedown", markUserActivity);
document.addEventListener("pointermove", markUserActivity, {passive: true});
document.addEventListener("pointerdown", markUserActivity);
document.addEventListener("touchstart", markUserActivity, {passive: true});
document.addEventListener("keydown", markUserActivity);
document.addEventListener("wheel", markUserActivity, {passive: true});

document.addEventListener("click", requestAudioInFrame);
document.addEventListener("pointerdown", requestAudioInFrame);
document.addEventListener("touchstart", requestAudioInFrame, {passive: true});
document.addEventListener("keydown", requestAudioInFrame);

buttons.forEach((button) => {
    button.addEventListener("click", () => {
        selectChannel(button);
        requestAudioInFrame();
    });
});

renumberChannelSubtitles();
selectChannel(getActiveButton());
</script>
