<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBO 2 - Bitmovin Player</title>

<script src="https://cdn.bitmovin.com/player/web/8/bitmovinplayer.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

#player {
    width: 100vw;
    height: 100vh;
    background: #000;
}

/* Oculta solo la barra de tiempo, mantiene audio/calidad/live/fullscreen/PiP */
#player .bmpui-ui-seekbar,
#player .bmpui-ui-seekbar-label {
    display: none !important;
}
</style>
</head>
<body>
<div id="player"></div>

<script>
const manifestUrl = "/stream/hbo";
const defaultBitmovinKey = "fa7bb753-749b-47ba-8134-838e896b252d";

const keyFromQuery = new URLSearchParams(window.location.search).get("bitmovinKey");
if (keyFromQuery) {
    localStorage.setItem("BITMOVIN_PLAYER_KEY", keyFromQuery);
}

const storedBitmovinKey = (localStorage.getItem("BITMOVIN_PLAYER_KEY") || "").trim();
const bitmovinKey = storedBitmovinKey || defaultBitmovinKey;

if (!storedBitmovinKey && defaultBitmovinKey) {
    localStorage.setItem("BITMOVIN_PLAYER_KEY", defaultBitmovinKey);
}

const playerContainer = document.getElementById("player");
let player = null;

function isSpanishLanguage(language) {
    const normalized = (language || "").toLowerCase();
    return normalized === "es" || normalized.startsWith("es-") || normalized === "spa" || normalized.startsWith("spa-");
}

function selectSpanishAudioTrack() {
    if (!player || typeof player.getAvailableAudio !== "function" || typeof player.setAudio !== "function") {
        return;
    }

    const tracks = player.getAvailableAudio() || [];
    if (!tracks.length) {
        return;
    }

    const spanishTrack = tracks.find((track) => {
        const lang = track.lang || track.language || "";
        return isSpanishLanguage(lang);
    });

    if (spanishTrack && spanishTrack.id) {
        player.setAudio(spanishTrack.id);
        console.log("Audio por defecto en espanol:", spanishTrack.lang || spanishTrack.language || "es");
    }
}

async function attemptAutoAudio() {
    try {
        if (!player) {
            return;
        }

        if (typeof player.unmute === "function") {
            player.unmute();
        }

        const playResult = player.play();
        if (playResult && typeof playResult.then === "function") {
            await playResult;
        }
    } catch (error) {
        console.warn("No se pudo activar audio:", error);
    }
}

function registerAudioUnlockHooks() {
    const unlock = () => {
        attemptAutoAudio();
    };

    document.addEventListener("pointerdown", unlock);
    document.addEventListener("click", unlock);
    document.addEventListener("touchstart", unlock, {passive: true});
    document.addEventListener("keydown", unlock);
}

window.addEventListener("message", (event) => {
    if (!event.data || event.data.type !== "ENABLE_AUDIO") {
        return;
    }

    attemptAutoAudio();
});

async function initPlayer() {
    if (!bitmovinKey) {
        console.error("No hay key de Bitmovin disponible");
        return;
    }

    const config = {
        key: bitmovinKey,
        playback: {
            autoplay: true,
            muted: true
        }
    };

    const source = {
        hls: manifestUrl
    };

    player = new bitmovin.player.Player(playerContainer, config);

    player.on(bitmovin.player.PlayerEvent.Error, (event) => {
        console.error("Bitmovin error:", event);
    });

    player.on(bitmovin.player.PlayerEvent.SourceLoaded, () => {
        selectSpanishAudioTrack();
    });

    try {
        await player.load(source);
        await attemptAutoAudio();
        setTimeout(() => {
            attemptAutoAudio();
        }, 800);
    } catch (error) {
        console.error("Error cargando stream:", error);
    }
}

window.addEventListener("beforeunload", () => {
    if (player && typeof player.destroy === "function") {
        player.destroy();
    }
});

registerAudioUnlockHooks();
document.addEventListener("DOMContentLoaded", initPlayer);
</script>
</body>
</html>
