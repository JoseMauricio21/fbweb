<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Canales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  <script type="module" crossorigin src="/assets/dashboard-xVoDD2EV.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/dashboard-B3-nhueh.css">
</head>
<body>
<button id="sidebarToggle" class="sidebar-toggle" type="button" aria-expanded="false" aria-controls="sidebarPanel">Canales</button>
<div class="app">
    <aside id="sidebarPanel" class="sidebar">
        <div class="brand">
            <h1>Canales</h1>
            <p>Selecciona un canal para verlo en la previsualizacion.</p>
        </div>

        <ul class="channel-list">
            <li>
                <button class="channel-button active" data-src="cinemax.html" data-name="CINEMAX HD">
                    <span class="channel-title">CINEMAX HD</span>
                    <span class="channel-subtitle">Canal 01 - ClearKey</span>
                </button>
            </li>
            <li>
                <button class="channel-button" data-src="bandamax.html" data-name="BANDAMAX HD">
                    <span class="channel-title">BANDAMAX HD</span>
                    <span class="channel-subtitle">Canal 02 - ClearKey</span>
                </button>
            </li>
            <li>
                <button class="channel-button" data-src="hbo2.html" data-name="HBO">
                    <span class="channel-title">HBO</span>
                    <span class="channel-subtitle">Canal 03 - HLS</span>
                </button>
            </li>
            <li>
                <button class="channel-button" data-src="canal5.html" data-name="CANAL 5">
                    <span class="channel-title">CANAL 5</span>
                    <span class="channel-subtitle">Canal 05 - HLS</span>
                </button>
            </li>
            <li>
                <button class="channel-button" data-src="bitme" data-name="BITME">
                    <span class="channel-title">BITME</span>
                    <span class="channel-subtitle">Canal 06 - ClearKey</span>
                </button>
            </li>
            <li>
                <button class="channel-button" data-src="distritocomedia" data-name="DISTRITO COMEDIA">
                    <span class="channel-title">DISTRITO COMEDIA</span>
                    <span class="channel-subtitle">Canal 07 - ClearKey</span>
                </button>
            </li>
            <li>
                <button class="channel-button" data-src="canal9" data-name="CANAL 9">
                    <span class="channel-title">CANAL 9</span>
                    <span class="channel-subtitle">Canal 09 - ClearKey</span>
                </button>
            </li>
            <li>
                <button class="channel-button" data-src="telehit" data-name="TELEHIT">
                    <span class="channel-title">TELEHIT</span>
                    <span class="channel-subtitle">Canal 10 - ClearKey</span>
                </button>
            </li>
            <li>
                <button class="channel-button" data-src="cinemaxeast" data-name="CINEMAX EAST">
                    <span class="channel-title">CINEMAX EAST</span>
                    <span class="channel-subtitle">Canal 11 - ClearKey</span>
                </button>
            </li>
            <li>
                <button class="channel-button" data-src="golden" data-name="GOLDEN">
                    <span class="channel-title">GOLDEN</span>
                    <span class="channel-subtitle">Canal 12 - ClearKey</span>
                </button>
            </li>
            <li>
                <button class="channel-button" data-src="warner.html" data-name="WARNER CHANNEL MX">
                    <span class="channel-title">WARNER CHANNEL MX</span>
                    <span class="channel-subtitle">Canal 04 - ClearKey</span>
                </button>
            </li>
        </ul>
    </aside>

    <main class="preview">
        <div class="preview-header">
            <div>
                <h2 id="channelName" class="preview-title">CINEMAX HD</h2>
                <p class="preview-note">Previsualizacion en tiempo real</p>
            </div>
            <a id="openChannelLink" class="open-link" href="cinemax.html" target="_blank" rel="noopener noreferrer">Abrir canal</a>
        </div>

        <div class="frame-wrap">
            <iframe
                id="previewFrame"
                src="cinemax.html"
                title="Previsualizacion del canal"
                allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
                allowfullscreen
                loading="eager">
            </iframe>
                <div id="epgOverlay" class="epg-overlay" aria-live="polite">
                    <div class="epg-logo-box">
                        <img id="epgLogo" class="epg-logo" alt="Logo del canal" hidden>
                        <span id="epgLogoFallback" class="epg-logo-fallback">TV</span>
                    </div>
                    <div class="epg-meta">
                        <p id="epgChannelName" class="epg-channel">CINEMAX HD</p>
                        <p id="epgNowTitle" class="epg-now">EPG pendiente (envia tu lista)</p>
                    </div>
                    <div class="epg-next-meta">
                        <p class="epg-next-label">Siguiente</p>
                        <p id="epgNextTitle" class="epg-next">Siguiente: pendiente</p>
                    </div>
                </div>
        </div>
    </main>
</div>


</body>
</html>
